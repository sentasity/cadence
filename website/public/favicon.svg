<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Cadence">
  <!-- Cadence brand mark · "Open-C / downbeat"
       Palette: cobalt #2f5fe0 → deep #1e3fa8 (docs "Paper & Cobalt" theme) -->
  <defs>
    <linearGradient id="cadence-cobalt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b6ef0"/>
      <stop offset="1" stop-color="#1e3fa8"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="24" fill="url(#cadence-cobalt)"/>
  <circle cx="47" cy="50" r="31" fill="none" stroke="#fff" stroke-width="15"
          stroke-linecap="round" stroke-dasharray="163.4 31.4" transform="rotate(29 47 50)"/>
  <circle cx="80" cy="50" r="6.2" fill="#fff"/>

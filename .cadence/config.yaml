# Cadence config for the Cadence plugin source repo (dogfooding).
# Overrides only what differs from defaults/config.default.yaml.

config_version: 5
paths:
  designs: docs/designs
  plans:   docs/plans
  future:  docs/future
  config:  .cadence

plan:
  tdd: true
  commit_cadence: per-task
  parallel_grain: in-file

execute:
  branch_check: true
  auto_resolve_drift: false
  max_parallel: 5
  resume_on_dirty_tree: false
  parallel: true           # master switch; false => sequential, no worktrees
  worktree_confirm: true   # one-time pre-flight worktree confirmation

worktree:
  dir: .cadence/worktrees     # canonical home (relocated from execute.worktree_dir)
  integrate: rebase-ff        # rebase-ff | merge-commit (relocated from execute.integrate)
  merge_lock: true            # on by default; both /c-worktree and /c-execute acquire it
  lock_stale_threshold: 600   # seconds; past this a held lock surfaces "steal it?" (never auto-steal)
  hooks:                      # all null by default -> generic behavior; null hook = phase absent
    provision:    null        # runs after `git worktree add`
    port_assign:  null        # allocates a dev port for the worktree; MUST print the port to stdout
    port_release: null        # frees the worktree's port at cleanup
    dev_server:   null        # starts the worktree's dev server (Sentasity-only in practice)
    deploy_guard: null        # exits non-zero if a deploy is not allowed from here (Sentasity-only)

advisors:
  enabled: false
  roster: []

naming:
  date_format: "YYYY-MM-DD"
  slug_case: kebab

status:
  design: [draft, in-review, approved, completed, superseded, on-hold]
  plan:   [draft, in-progress, implemented, completed, superseded, on-hold]

frontmatter:
  required: [title, created, updated, status, tags]

authoring:
  max_parallel: 6          # concurrent doc-generator agents (no worktrees; cheap)
  design_mode: ask         # ask | all-at-once | one-by-one (standing default for /c-design)

audits:
  default:
    - checkbox-completeness
    - oos-justification
    - deferred-comment-scan
    - code-behind-checkbox
    - design-intent-alignment
    - build-validator
    - merge-integrity
  warnings:
    - file-map-honesty
    - design-plan-consistency
    - validation-doc-presence
  optional: []
  build_validator:
    command: node --test scripts/migrate-config.test.js
    expect_zero_exit: true

plain_english:
  section_callout: true
  always_write_00a: true
  length_target: "400-700"

oos:
  require_rationale: true
  require_wikilink: true

validate:
  reset_checkboxes_on_rerun: true
  browser_driver: auto                     # auto | playwright | manual
  browser_command: "npx playwright test"   # CLI test invocation Cadence delegates to
  browser_env_preamble: null               # optional shell snippet run before the command; null = none

find_bugs:
  default_baseline: main
  exclude: [node_modules, dist, build, __pycache__, target, .next, vendor]

storage:
  backend: filesystem          # filesystem | notion  (default: filesystem, today's behavior)
  notion:
    root_page:  ""             # Notion page URL or id to provision under; share it with the MCP integration
    designs_db: ""             # auto-filled on first Notion-mode run, then commit
    plans_db:   ""             # auto-filled on first Notion-mode run, then commit
